name: Relabel Agentic Workflow Issues

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

# Top-level: no permissions; granted per-job only
permissions: {}

jobs:
  relabel:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const { owner, repo } = context.repo;

            // Relabel issues with 'agentic-workflows' label
            const awIssues = await github.rest.issues.listForRepo({
              owner, repo,
              labels: 'agentic-workflows',
              state: 'open',
              per_page: 100
            });

            for (const issue of awIssues.data) {
              const issue_number = issue.number;

              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['bot/skip-grooming', 'bot/agentic-workflows'] });

              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name: 'agentic-workflows' });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }

            // Add bot/skip-grooming to issues with 'bot/daily-test-improver' that don't have it yet
            const tiIssues = await github.rest.issues.listForRepo({
              owner, repo,
              labels: 'bot/daily-test-improver',
              state: 'open',
              per_page: 100
            });

            for (const issue of tiIssues.data) {
              const hasSkipGrooming = issue.labels.some(l => l.name === 'bot/skip-grooming');
              if (!hasSkipGrooming) {
                await github.rest.issues.addLabels({ owner, repo, issue_number: issue.number, labels: ['bot/skip-grooming'] });
              }
            }
