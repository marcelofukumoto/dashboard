name: E2E Automation Spec Runner

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to test (leave empty for first run)"
        required: false
        type: string
        default: ""
      run_number:
        description: "Consecutive pass counter (1-5). Stops when reaching 5."
        required: false
        type: string
        default: "1"

env:
  TEST_USERNAME: admin
  TEST_PASSWORD: password
  CATTLE_BOOTSTRAP_PASSWORD: password
  TEST_BASE_URL: https://127.0.0.1.sslip.io
  API: https://127.0.0.1.sslip.io
  TEST_PROJECT_ID: rancher-dashboard
  BUILD_DASHBOARD: true
  E2E_RANCHER_LOG: rancher.log
  E2E_BUILD_DIST_NAME: dist
  E2E_BUILD_DIST_DIR: dist
  E2E_BUILD_DIST_EMBER_NAME: dist_ember
  E2E_BUILD_DIST_EMBER_DIR: dist_ember

jobs:
  e2e-ui-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Setup env
        uses: ./.github/actions/setup
      - name: Build e2e
        run: yarn e2e:build
      - name: Upload e2e build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.E2E_BUILD_DIST_NAME }}
          path: ${{ env.E2E_BUILD_DIST_DIR }}/
          if-no-files-found: error
          retention-days: 10
          compression-level: 9
      - name: Upload e2e build ember
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.E2E_BUILD_DIST_EMBER_NAME }}
          path: ${{ env.E2E_BUILD_DIST_EMBER_DIR }}/
          if-no-files-found: error
          retention-days: 10
          compression-level: 9

  e2e-test:
    needs: e2e-ui-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      pull-requests: write
    steps:
      - name: Resolve checkout ref
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ github.event.inputs.pr_number }}"
          if [ -n "$PR_NUM" ] && [ "$PR_NUM" != "0" ]; then
            HEAD_REF=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" \
              --json headRefName -q .headRefName)
            echo "ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.ref }}
          fetch-depth: 1

      - name: Setup env
        uses: ./.github/actions/setup

      - name: Download e2e build
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.E2E_BUILD_DIST_NAME }}
          path: ${{ env.E2E_BUILD_DIST_DIR }}

      - name: Download e2e build ember
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.E2E_BUILD_DIST_EMBER_NAME }}
          path: ${{ env.E2E_BUILD_DIST_EMBER_DIR }}

      - name: Run Rancher
        run: yarn e2e:docker

      - name: Setup Rancher and user
        run: |
          yarn e2e:prod
        env:
          GREP_TAGS: "@adminUserSetup --@jenkins"
          TEST_USERNAME: admin
          TEST_ONLY: setup

      - name: Run user tests
        id: run-tests
        run: |
          yarn e2e:prod
        env:
          TEST_SKIP: setup
          GREP_TAGS: "@adminUser --@jenkins"
          TEST_USERNAME: admin

      - name: Fetch Rancher Logs
        if: ${{ failure() }}
        run: yarn docker:local:logs

      - name: Create Artifacts Folder
        if: ${{ always() }}
        run: |
          mkdir artifacts
          cp -r cypress/screenshots artifacts 2>/dev/null || :
          cp -r cypress/videos artifacts 2>/dev/null || :
          cp -r cypress/reports/* artifacts || :
          cp ${{ env.E2E_RANCHER_LOG }} artifacts/rancher.logs 2>/dev/null || :
          cp browser-logs/out.html artifacts/browser-logs.html 2>/dev/null || :

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: e2e-spec-runner-results-run-${{ github.event.inputs.run_number }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 10
          compression-level: 9

      # ── On pass: re-trigger or finish ─────────────────────────────
      - name: On success — re-trigger or finish
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_NUM="${{ github.event.inputs.run_number }}"
          PR_NUM="${{ steps.resolve.outputs.pr_number }}"

          echo "✅ Run $RUN_NUM/5 passed."

          if [ "$RUN_NUM" -ge 5 ]; then
            echo "All 5 consecutive runs passed — suite is stable!"
            if [ -n "$PR_NUM" ]; then
              gh pr comment "$PR_NUM" --repo "${{ github.repository }}" \
                --body "✅ **E2E Spec Runner** — 5/5 consecutive runs passed. Suite is stable."
            fi
          else
            NEXT=$((RUN_NUM + 1))
            echo "Dispatching run $NEXT/5…"

            gh workflow run e2e-automation-spec-runner.yml \
              --repo "${{ github.repository }}" \
              --ref "${{ github.ref_name }}" \
              -f pr_number="$PR_NUM" \
              -f run_number="$NEXT"

            if [ -n "$PR_NUM" ]; then
              gh pr comment "$PR_NUM" --repo "${{ github.repository }}" \
                --body "✅ **E2E Spec Runner** — Run $RUN_NUM/5 passed. Triggering run $NEXT…"
            fi
          fi

      # ── On fail: dispatch fixer ───────────────────────────────────
      - name: On failure — dispatch fixer
        if: failure() && steps.run-tests.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_NUM="${{ github.event.inputs.run_number }}"
          PR_NUM="${{ steps.resolve.outputs.pr_number }}"

          echo "❌ Run $RUN_NUM/5 failed. Dispatching fixer…"

          # Build failure summary from Cypress output
          FAILED_SPECS=$(grep -rE '^\s+✖\s+' artifacts/ 2>/dev/null \
            | sed 's/.*✖\s*//' | sed 's/\s*[0-9].*$//' | sort -u || true)
          SPEC_LIST=$(echo "$FAILED_SPECS" | jq -R -s 'split("\n") | map(select(. != ""))')

          FAILURE_SUMMARY=$(jq -nc \
            --arg run "$RUN_NUM" \
            --arg pr "$PR_NUM" \
            --argjson failed_specs "$SPEC_LIST" \
            '{run_number:($run|tonumber), pr_number:$pr, failed_specs:$failed_specs}')

          gh workflow run e2e-automation-fixer.lock.yml \
            --repo "${{ github.repository }}" \
            --ref e2e-agentic \
            -f pr_number="$PR_NUM" \
            -f run_number="$RUN_NUM" \
            -f failure_summary="$FAILURE_SUMMARY" \
            -f runner_run_id="${{ github.run_id }}"

          if [ -n "$PR_NUM" ]; then
            FAILED_COUNT=$(echo "$SPEC_LIST" | jq 'length')
            gh pr comment "$PR_NUM" --repo "${{ github.repository }}" \
              --body "❌ **E2E Spec Runner** — Run $RUN_NUM/5 failed ($FAILED_COUNT spec(s)). Dispatching the fixer."
          fi
